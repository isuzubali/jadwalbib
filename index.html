<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Sedang Memuat...</title>
    <style>
        /* Gaya dasar untuk mereset margin dan menengahkan konten */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #f4f4f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Animasi Spinner Loading */
        .loader {
            border: 8px solid #e5e5e5;
            border-top: 8px solid #3498db;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Teks Timer */
        #countdown {
            font-size: 1.5rem;
            color: #333;
            font-weight: bold;
        }

        #loading-text {
            color: #666;
            margin-bottom: 10px;
        }

        /* Konten utama disembunyikan di awal */
        #main-content {
            display: none;
            text-align: center;
            animation: fadeIn 1s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Container untuk layar loading */
        #loading-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
    </style>
</head>
<body>

    <!-- Layar Loading -->
    <div id="loading-screen">
        <div class="loader"></div>
        <div id="loading-text">Mohon tunggu, sedang memuat data...</div>
        <div id="countdown">01:00</div>
    </div>

    <!-- Konten Utama (Muncul setelah 5 menit) -->
    <div id="main-content">
        <h1>Selesai!</h1>
        <p>Proses memuat selama 1 menit telah berhasil.</p>
    </div>

    <script>
        // Set waktu 5 menit dalam satuan detik (5 * 60)
        let timeLeft = 100; 
        
        const countdownElement = document.getElementById('countdown');
        const loadingScreen = document.getElementById('loading-screen');
        const mainContent = document.getElementById('main-content');

        // Jalankan fungsi setiap 1000 milidetik (1 detik)
        const timer = setInterval(() => {
            timeLeft--;

            // Hitung menit dan detik yang tersisa
            let minutes = Math.floor(timeLeft / 60);
            let seconds = timeLeft % 60;

            // Tambahkan angka 0 di depan jika di bawah 10 (contoh: 04:09)
            let formattedTime = 
                (minutes < 10 ? "0" + minutes : minutes) + ":" + 
                (seconds < 10 ? "0" + seconds : seconds);

            // Update teks di HTML
            countdownElement.textContent = formattedTime;

            // Jika waktu sudah habis (mencapai 0)
            if (timeLeft <= 0) {
                clearInterval(timer); // Hentikan timer
                
                // Opsi 1: Sembunyikan loading, tampilkan konten utama di halaman yang sama
                loadingScreen.style.display = 'none';
                mainContent.style.display = 'block';

                // Opsi 2: Jika kamu ingin pindah ke halaman HTML lain, hapus komentar pada baris di bawah ini:
                window.location.href = "indexb.html";
                mainContent.style.display = 'none';
            }
        }, 1000); 
    </script>
</body>
</html>
